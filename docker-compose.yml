version: '3.8'

services:
  # Serviço do Nginx, responsável por receber as requisições HTTP
  nginx:
    image: nginx:1.30-alpine3.23
    container_name: app_nginx
    restart: unless-stopped

    # Mapeia a porta do host para a do container (Mantenha 8080:80 se quiser evitar conflito na porta 80 do seu PC)
    ports:
      - "8080:80"

    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./:/var/www
      - ./public:/var/www/public:ro

    tmpfs:
      - /tmp:size=32m,mode=1777
      - /var/cache/nginx:size=64m,uid=101,gid=101

    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.50"
        reservations:
          memory: 16M

    ulimits:
      nofile:
        soft: 65536
        hard: 65536

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    depends_on:
      - php
    networks:
      - app_network

  # Serviço do Redis (Cache / Filas)
  redis:
    image: redis:8.6-alpine3.23
    container_name: app_redis
    restart: unless-stopped
    environment:
      TZ: ${TZ:-America/Sao_Paulo}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: >
      sh -c "exec redis-server --requirepass \"$${REDIS_PASSWORD}\""
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli -h 127.0.0.1 -p 6379 -a \"$${REDIS_PASSWORD}\" ping | grep PONG || exit 1" ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    volumes:
      - ./docker/redis/storage:/data
    networks:
      - app_network

  # Serviço do PHP, responsável por executar a aplicação
  php:
    working_dir: /var/www
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: app_php
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./:/var/www
    command: >
      sh -c "composer install --no-interaction &&
             composer dump-autoload -o &&
             php-fpm"
    environment:
      TZ: ${TZ:-America/Sao_Paulo}
      XDEBUG_MODE: ${APP_DEBUG:+debug}
      PHP_FPM_PM: dynamic
      PHP_FPM_PM_MAX_CHILDREN: 10
      PHP_FPM_PM_START_SERVERS: 2
      PHP_FPM_PM_MIN_SPARE_SERVERS: 1
      PHP_FPM_PM_MAX_SPARE_SERVERS: 3
      PHP_FPM_PM_MAX_REQUESTS: 500
    tmpfs:
      - /tmp:size=64m,mode=1777
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.00"
        reservations:
          memory: 256M
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: [ "CMD-SHELL", "nc -z localhost 9000 || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network

  # Serviço do banco de dados PostgreSQL
  postgres:
    image: postgres:18.3-alpine3.23
    container_name: app_postgres
    restart: unless-stopped
    command: >
      postgres
        -c shared_buffers=128MB
        -c effective_cache_size=384MB
        -c work_mem=4MB
        -c maintenance_work_mem=64MB
        -c wal_buffers=16MB
        -c max_connections=50
        -c checkpoint_completion_target=0.9
        -c synchronous_commit=off
        -c log_min_duration_statement=1000
        -c log_timezone=${TZ:-America/Sao_Paulo}
        -c temp_file_limit=256MB
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      TZ: ${TZ:-America/Sao_Paulo}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      # Mantive o mapeamento local para ./docker/postgres/... como estava no seu segundo arquivo
      - ./docker/postgres/storage:/var/lib/postgresql/data/pgdata
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    tmpfs:
      - /tmp:size=64m,mode=1777
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.00"
        reservations:
          memory: 256M
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    ports:
      - "${DB_PORT:-5432}:${DB_PORT:-5432}"
    networks:
      - app_network

networks:
  app_network:
    driver: bridge
