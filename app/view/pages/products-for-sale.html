<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Products for Sale</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="../../../resources/css/products-for-sale.css"
    />
  </head>
  <body>
    <nav class="navbar is-dark" role="navigation" aria-label="main navigation">
      <div class="container">
        <div class="navbar-brand">
          <a class="navbar-item" href="index.html">
            <strong class="is-size-4"
              ><i class="fas fa-store mr-2"></i>MINIMAL.</strong
            >
          </a>

          <a
            role="button"
            class="navbar-burger"
            aria-label="menu"
            aria-expanded="false"
            data-target="navMenu"
          >
            <span aria-hidden="true"></span>
            <span aria-hidden="true"></span>
            <span aria-hidden="true"></span>
          </a>
        </div>

        <div id="navMenu" class="navbar-menu">
          <div class="navbar-item is-expanded">
            <div class="field has-addons" style="width: 100%">
              <div class="control is-expanded">
                <input
                  class="input is-rounded"
                  type="text"
                  placeholder="What are you looking for?"
                />
              </div>
              <div class="control">
                <button class="button is-warning is-rounded">
                  <span class="icon is-small">
                    <i class="fas fa-search"></i>
                  </span>
                </button>
              </div>
            </div>
          </div>

          <div class="navbar-end">
            <a href="index.html" class="navbar-item">
              <span class="icon-text">
                <span class="icon"><i class="fas fa-home"></i></span>
                <span>Home</span>
              </span>
            </a>

            <div class="navbar-item">
              <div class="buttons">
                <a class="button is-light">
                  <span class="icon"><i class="fas fa-shopping-cart"></i></span>
                  <span>Cart</span>
                </a>
              </div>
            </div>
            <div class="navbar-item">
              <div class="buttons">
                <a class="button is-light">
                  <span class="icon"><i class="fa-regular fa-heart"></i></span>
                  <span>Favorites</span>
                </a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </nav>

    <section class="section">
      <div class="container">
        <h1 class="title">our products</h1>
        <p class="subtitle">Check out the best deals of the day!</p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="columns is-multiline">
          <div class="column is-4">
            <div class="card product-card">
              <div class="card-image image-container">
                <figure class="image is-4by3">
                  <img
                    src="https://via.placeholder.com/400x300"
                    alt="Produto"
                  />
                </figure>
                <div class="carousel-nav">
                  <span class="nav-arrow"
                    ><i class="fas fa-chevron-left"></i
                  ></span>
                  <span class="nav-arrow"
                    ><i class="fas fa-chevron-right"></i
                  ></span>
                </div>
              </div>

              <div class="product-options">
                <a class="option-icon" title="Favoritar"
                  ><i class="far fa-heart"></i
                ></a>
                <a class="option-icon" title="Comparar"
                  ><i class="fas fa-sync-alt"></i
                ></a>
                <a class="option-icon" title="Ver detalhes"
                  ><i class="fas fa-eye"></i
                ></a>
                <a class="option-icon" title="Compartilhar"
                  ><i class="fas fa-share-alt"></i
                ></a>
              </div>

              <div class="card-content">
                <p class="title is-5">Smartphone Galaxy Z</p>
                <p class="subtitle is-6 has-text-primary">R$ 4.500,00</p>
                <button class="button is-dark is-fullwidth">
                  <span class="icon"><i class="fas fa-cart-plus"></i></span>
                  <span>Adicionar</span>
                </button>
              </div>
            </div>
          </div>

          <div class="column is-4">
            <div class="card product-card">
              <div class="card-image image-container">
                <figure class="image is-4by3">
                  <img
                    src="https://via.placeholder.com/400x300/222/fff"
                    alt="Produto"
                  />
                </figure>
                <div class="carousel-nav">
                  <span class="nav-arrow"
                    ><i class="fas fa-chevron-left"></i
                  ></span>
                  <span class="nav-arrow"
                    ><i class="fas fa-chevron-right"></i
                  ></span>
                </div>
              </div>
              <div class="product-options">
                <a class="option-icon"><i class="far fa-heart"></i></a>
                <a class="option-icon"><i class="fas fa-sync-alt"></i></a>
                <a class="option-icon"><i class="fas fa-eye"></i></a>
                <a class="option-icon"><i class="fas fa-share-alt"></i></a>
              </div>
              <div class="card-content">
                <p class="title is-5">Notebook Ultra Slim</p>
                <p class="subtitle is-6 has-text-primary">R$ 3.200,00</p>
                <button class="button is-dark is-fullwidth">
                  <span class="icon"><i class="fas fa-cart-plus"></i></span>
                  <span>Adicionar</span>
                </button>
              </div>
            </div>
          </div>

          <div class="column is-4">
            <div class="card product-card">
              <div class="card-image image-container">
                <figure class="image is-4by3">
                  <img
                    src="https://via.placeholder.com/400x300/444/fff"
                    alt="Produto"
                  />
                </figure>
                <div class="carousel-nav">
                  <span class="nav-arrow"
                    ><i class="fas fa-chevron-left"></i
                  ></span>
                  <span class="nav-arrow"
                    ><i class="fas fa-chevron-right"></i
                  ></span>
                </div>
              </div>
              <div class="product-options">
                <a class="option-icon"><i class="far fa-heart"></i></a>
                <a class="option-icon"><i class="fas fa-sync-alt"></i></a>
                <a class="option-icon"><i class="fas fa-eye"></i></a>
                <a class="option-icon"><i class="fas fa-share-alt"></i></a>
              </div>
              <div class="card-content">
                <p class="title is-5">Fone Bluetooth ANC</p>
                <p class="subtitle is-6 has-text-primary">R$ 890,00</p>
                <button class="button is-dark is-fullwidth">
                  <span class="icon"><i class="fas fa-cart-plus"></i></span>
                  <span>Adicionar</span>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <script src="../../../resources/js/pages/products-for-sale.js"></script>
  </body>
</html>
