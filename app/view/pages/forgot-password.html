<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/forgot-password.css">
<body>
<section class="section">
  <div class="container">
    <div class="columns is-centered">
      <div class="column is-4-desktop is-6-tablet">
        
        <div class="auth-container">
          <div class="mb-4">
            <a href="login.html" class="has-text-grey is-size-7">
              <i class="fas fa-arrow-left"></i> Retiurn to login
            </a>
          </div>

          <div class="box">
            <div class="has-text-centered mb-5">
              <span class="icon is-large has-text-primary">
                <i class="fas fa-lock-open fa-3x"></i>
              </span>
              <h1 class="title is-4 mt-3">Forgot Password?</h1>
              <p class="subtitle is-6">Choose your profile to recover.</p>
            </div>

            <div class="tabs is-toggle is-fullwidth is-small mb-5">
              <ul>
                <li class="is-active" id="tab-cliente" onclick="switchTab('cliente')">
                  <a><span>User</span></a>
                </li>
                <li id="tab-fornecedor" onclick="switchTab('fornecedor')">
                  <a><span>Supplier</span></a>
                </li>
              </ul>
            </div>

            <div id="content-recuperacao">
              <div id="form-cliente">
                <form>
                  <div class="field">
                    <label class="label is-small">Email</label>
                    <div class="control has-icons-left">
                      <input class="input is-small" type="email" placeholder="you@email.com">
                      <span class="icon is-small is-left"><i class="fas fa-envelope"></i></span>
                    </div>
                  </div>
                  <button class="button is-primary is-small is-fullwidth">Send email</button>
                  
                  <div class="divider my-4">OR</div>
                  
                  <div class="field">
                    <label class="label is-small">SMS</label>
                    <div class="control has-icons-left">
                      <input class="input is-small" type="tel" placeholder="(11) 99999-9999">
                      <span class="icon is-small is-left"><i class="fas fa-phone"></i></span>
                    </div>
                  </div>
                  <button class="button is-link is-light is-small is-fullwidth">Send SMS</button>
                </form>
              </div>

              <div id="form-fornecedor" class="is-hidden">
                <form>
                  <div class="field">
                    <label class="label is-small">Corporate email</label>
                    <div class="control has-icons-left">
                      <input class="input is-small" type="email" placeholder="supplier@enterprise.com">
                      <span class="icon is-small is-left"><i class="fas fa-briefcase"></i></span>
                    </div>
                  </div>
                  <div class="field">
                    <label class="label is-small">CNPJ</label>
                    <div class="control has-icons-left">
                      <input class="input is-small" type="text" placeholder="00.000.000/0001-00">
                      <span class="icon is-small is-left"><i class="fas fa-id-card"></i></span>
                    </div>
                  </div>
                  <button class="button is-primary is-small is-fullwidth mt-4">Validate supplier</button>
                </form>
              </div>
            </div>

            <p class="has-text-centered is-size-7 mt-5">
             Don't have an account yet? <a href="login.html?tab=register">Register</a>
            </p>
          </div>
        </div>

      </div>
    </div>
  </div>
</section>
<script src="../assets/js/forgot-password.js"></script>
</body>
</html>
