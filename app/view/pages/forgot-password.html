<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/forgot-password.css">
<body>
    <section class="section">
    <div class="container">
      <div class="columns is-centered">
        <div class="column is-4-desktop is-6-tablet">
          
          <div class="auth-container">
            <div class="mb-4">
              <a href="login.html" class="has-text-grey is-size-7">
                <i class="fas fa-arrow-left"></i> Voltar para o login
              </a>
            </div>

            <div class="box">
              <div class="has-text-centered mb-5">
                <span class="icon is-large has-text-primary">
                  <i class="fas fa-lock-open fa-3x"></i>
                </span>
                <h1 class="title is-4 mt-3">Esqueceu sua senha?</h1>
                <p class="subtitle is-6">Escolha como deseja receber o código de verificação.</p>
              </div>

              <form>
                <div class="field">
                  <label class="label">Recuperar por E-mail</label>
                  <div class="field has-addons">
                    <div class="control has-icons-left is-expanded">
                      <input class="input" type="email" placeholder="seu@email.com">
                      <span class="icon is-small is-left"><i class="fas fa-envelope"></i></span>
                    </div>
                    <div class="control">
                      <button class="button is-primary">Enviar</button>
                    </div>
                  </div>
                </div>

                <div class="divider">OU</div>

                <div class="field">
                  <label class="label">Recuperar por SMS</label>
                  <div class="field has-addons">
                    <div class="control is-expanded has-icons-left">
                      <input class="input" type="tel" placeholder="(11) 99999-9999">
                      <span class="icon is-small is-left"><i class="fas fa-phone"></i></span>
                    </div>
                    <div class="control">
                      <button class="button is-link">Enviar</button>
                    </div>
                  </div>
                </div>
              </form>
              <p class="has-text-centered is-size-7 mt-5">
                Ainda não tem conta? <a href="login.html?tab=register">Cadastre-se</a>
              </p>
            </div>
          </div>

        </div>
      </div>
    </div>
  </section>
</body>
</html>
