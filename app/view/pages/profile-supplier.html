<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Supplier Profile</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="../../../public/assets/css/profile-supplier.css"
    />
  </head>

  <body>
    <section class="section">
      <div class="container">
        <div class="columns">
          <div class="column is-3">
            <aside class="menu box">
              <p class="menu-label">Business</p>
              <ul class="menu-list">
                <li>
                  <a
                    id="link-empresa"
                    onclick="showSection('empresa')"
                    class="is-active"
                  >
                    <i class="fas fa-building mr-2"></i> Company Information
                  </a>
                </li>
              </ul>

              <p class="menu-label">Settings</p>
              <ul class="menu-list">
                <li>
                  <a
                    id="link-preferencias"
                    onclick="showSection('preferencias')"
                  >
                    <i class="fas fa-cog mr-2"></i> Preferências
                  </a>
                </li>
              </ul>

              <p class="menu-label">Security</p>
              <ul class="menu-list">
                <li>
                  <a id="link-seguranca" onclick="showSection('seguranca')">
                    <i class="fas fa-shield-halved mr-2"></i> Security and
                    Access
                  </a>
                </li>
              </ul>
            </aside>
          </div>

          <div class="column is-9">
            <div id="section-empresa" class="content-section">
              <div class="box">
                <h2 class="title is-4">Supplier Profile</h2>
                <div class="columns is-multiline">
                  <div class="column is-6">
                    <div class="field">
                      <label class="label">Company Name</label>
                      <input
                        class="input"
                        type="text"
                        value="Global Logistics LLC"
                      />
                    </div>
                  </div>
                  <div class="column is-6">
                    <div class="field">
                      <label class="label">Company ID</label>
                      <input
                        class="input"
                        type="text"
                        value="00.000.000/0001-00"
                        readonly
                      />
                    </div>
                  </div>
                </div>
                <button class="button is-primary">Update Information</button>
              </div>
            </div>

            <div id="section-seguranca" class="content-section is-hidden">
              <div class="box">
                <h3 class="title is-5">
                  <i class="fas fa-envelope-open-text mr-2"></i> Billing Email
                </h3>
                <div class="field has-addons">
                  <div class="control is-expanded">
                    <input
                      class="input"
                      type="email"
                      value="finance@supplier.com"
                    />
                  </div>
                  <div class="control">
                    <button class="button is-link">Change</button>
                  </div>
                </div>
              </div>
            </div>

            <div id="section-preferencias" class="content-section is-hidden">
  <div class="box">
    <h3 class="title is-5">
      <i class="fas fa-palette mr-2"></i> Appearance
    </h3>

    <div class="field">
      <label class="label is-small">Dashboard Theme</label>

      <div class="control">
        <div class="buttons has-addons">
          <button
            class="button is-small is-selected is-info"
            id="btn-light"
            onclick="setTheme('light')"
          >
            <span class="icon is-small">
              <i class="fas fa-sun"></i>
            </span>

            <span>Light</span>
          </button>

          <button
            class="button is-small"
            id="btn-dark"
            onclick="setTheme('dark')"
          >
            <span class="icon is-small">
              <i class="fas fa-moon"></i>
            </span>

            <span>Dark</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="box">
    <h3 class="title is-5">
      <i class="fas fa-laptop-code mr-2"></i> Devices
    </h3>

    <table class="table is-fullwidth is-hoverable is-narrow">
      <thead>
        <tr>
          <th>Device</th>
          <th>Location</th>
          <th>Status</th>
          <th></th>
        </tr>
      </thead>

      <tbody class="is-size-7">
        <tr>
          <td>Chrome on Windows</td>
          <td>São Paulo, BR</td>

          <td>
            <span class="tag is-success is-light">
              Current
            </span>
          </td>

          <td></td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="box">
    <h3 class="title is-5">
      <i class="fas fa-history mr-2"></i> History
    </h3>

    <div class="is-size-7">
      <div class="notification is-light py-2 mb-1">
        <p>
          <strong>Password changed</strong> successfully.
        </p>
      </div>
    </div>
  </div>
</div>
    </section>

    <script src="../assets/js/profile-supplier.js"></script>
  </body>
</html>
