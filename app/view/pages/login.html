<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../assets/css/login.css" />
  </head>
  <body>
    <section class="section">
      <div class="container">
        <div class="columns is-centered">
          <div class="column is-4-desktop is-6-tablet">
            <div class="auth-container">
              <div class="tabs is-centered is-toggle is-toggle-rounded">
                <ul>
                  <li id="login-tab" class="is-active">
                    <a onclick="showTab('login')">Sign In</a>
                  </li>
                  <li id="register-tab">
                    <a onclick="showTab('register')">Register</a>
                  </li>
                </ul>
              </div>

              <div class="box">
                <div id="login-content" class="tab-content is-active">
                  <div class="has-text-centered mb-5">
                    <h1 class="title is-4">Sign In</h1>
                    <p class="subtitle is-6">Welcome Back!</p>
                  </div>

                  <form>
                    <div class="field">
                      <label class="label">E-mail</label>
                      <div class="control has-icons-left">
                        <input
                          class="input"
                          type="email"
                          placeholder="your@gmail.com"
                          required
                        />
                        <span class="icon is-small is-left"
                          ><i class="fas fa-envelope"></i
                        ></span>
                      </div>
                    </div>

                    <div class="field">
                      <label class="label">Password</label>
                      <div class="control has-icons-left has-icons-right">
                        <input
                          class="input"
                          type="password"
                          id="login-pass"
                          placeholder="********"
                          required
                        />
                        <span class="icon is-small is-left"
                          ><i class="fas fa-lock"></i
                        ></span>
                        <span
                          class="icon is-small is-right"
                          onclick="togglePassword('login-pass')"
                        >
                          <i class="fas fa-eye" id="login-pass-icon"></i>
                        </span>
                      </div>
                    </div>

                    <button class="button is-primary is-fullwidth mt-5">
                      Sign In
                    </button>
                  </form>

                  <p class="has-text-centered is-size-7 mt-4">
                    <a href="./forgot-password.html">Forgot Password?</a>
                  </p>
                </div>

                <div id="register-content" class="tab-content">
                  <div class="has-text-centered mb-5">
                    <h1 class="title is-4">Sign Up</h1>
                    <p class="subtitle is-6">create your account</p>
                  </div>

                  <form>
                    <div class="field">
                      <label class="label">Full Complete</label>
                      <div class="control has-icons-left">
                        <input
                          class="input"
                          type="text"
                          placeholder="What do you want to be called?"
                          required
                        />
                        <span class="icon is-small is-left"
                          ><i class="fas fa-user"></i
                        ></span>
                      </div>
                    </div>

                    <div class="field">
                      <label class="label">E-mail</label>
                      <div class="control has-icons-left">
                        <input
                          class="input"
                          type="email"
                          placeholder="new@gmail.com"
                          required
                        />
                        <span class="icon is-small is-left"
                          ><i class="fas fa-envelope"></i
                        ></span>
                      </div>
                    </div>

                    <div class="field">
                      <label class="label">Password</label>
                      <div class="control has-icons-left has-icons-right">
                        <input
                          class="input"
                          type="password"
                          id="reg-pass"
                          placeholder="minimum 8 characters"
                          required
                        />
                        <span class="icon is-small is-left"
                          ><i class="fas fa-lock"></i
                        ></span>
                        <span
                          class="icon is-small is-right"
                          onclick="togglePassword('reg-pass')"
                        >
                          <i class="fas fa-eye" id="reg-pass-icon"></i>
                        </span>
                      </div>
                    </div>

                    <button class="button is-link is-fullwidth mt-5">
                      Sign In
                    </button>
                  </form>

                  <p class="has-text-centered is-size-7 mt-4 has-text-grey">
                    By registering, you accept our terms.
                  </p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
    <script src="../assets/js/login.js"></script>
  </body>
</html>
